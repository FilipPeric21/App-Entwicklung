  </div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div id="drop-zone" class="border border-primary border-dashed rounded-3 p-5 text-center bg-light" style="border-style: dashed !important; cursor: pointer;">

                <h4 class="mt-3">Bild hierher ziehen</h4>
                <p>oder klicken, um Datei zu wählen</p>
                
                <input type="file" id="file-input" accept="image/png, image/jpeg" style="display: none;">
            </div>
