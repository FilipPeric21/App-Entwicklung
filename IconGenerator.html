<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Icon Generator - AppDevelopment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="AppDevelopment.html"><i class="bi bi-phone"></i> AppDevelopment</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="AppDevelopment.html">Startseite</a></li>
        <li class="nav-item"><a class="nav-link active" href="IconGenerator.html">Icon Generator</a></li>
      </ul>
    </div>
  </div>
</nav>

<header class="bg-primary text-white py-5 text-center">
  <div class="container">
    <h1 class="display-5 fw-bold"><i class="bi bi-grid-3x3-gap"></i> App Icon Generator</h1>
    <p class="lead">Erstelle automatisch alle Icon-Größen für iOS und Android</p>
  </div>
</header>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">
      
      <div class="card shadow-sm p-5 mb-4 border-dashed">
        <div class="card-body">
          <i class="bi bi-cloud-arrow-up display-1 text-muted"></i>
          <h3 class="mt-3">Bild hochladen</h3>
          <p class="text-secondary">Ziehe dein Icon (1024x1024 px) hierher oder klicke zum Auswählen</p>
          <input type="file" class="form-control mt-3" id="iconInput" accept="image/png, image/jpeg">
        </div>
      </div>

      <div id="previewArea" class="mt-5" style="display: none;">
        <h3>Vorschau</h3>
        <hr>
        <p>Hier erscheinen bald deine generierten Icons...</p>
      </div>

    </div>
  </div>
</main>

<footer class="bg-dark text-white text-center py-3 mt-auto">
  © 2026 AppDevelopment
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
